
name: Fabric CICD

on:
  push:
    branches:
      - main

  workflow_dispatch:   # Manual deploy to PROD
    inputs:
      target:
        description: "Target pipeline"
        required: true
        type: choice
        options:
          - finance
          - sales
          - operations

      deployToProd:
        description: "Deploy to PROD?"
        required: true
        type: choice
        options:
          - no
          - yes

env:
  TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
  APP_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  APP_SECRET_KEY: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  GIT_CONNECTION_ID: ${{ vars.GIT_CONNECTION_ID }}

jobs:

  deploy_to_test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed folder
        run: |
          echo "Detecting changed folder..."

          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})

          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -q "^DataOps/"; then
            echo "TARGET=sales" >> $GITHUB_ENV

          elif echo "$CHANGED_FILES" | grep -q "^ws-finance/"; then
            echo "TARGET=finance" >> $GITHUB_ENV

          elif echo "$CHANGED_FILES" | grep -q "^ws-deploy-poc/"; then
            echo "TARGET=operations" >> $GITHUB_ENV

          else
            echo "No matching folder → defaulting to finance"
            echo "TARGET=finance" >> $GITHUB_ENV
          fi

      - name: Set pipeline configuration
        run: |
          if [ -n "${{ github.event.inputs.target }}" ]; then
            TARGET="${{ github.event.inputs.target }}"
          elif [ -n "$TARGET" ]; then
            TARGET="$TARGET"
          else
            TARGET="finance"
          fi

          echo "Selected pipeline: $TARGET"

          if [ "$TARGET" == "finance" ]; then
            echo "PIPELINE_ID=${{ vars.FINANCE_PIPELINE_ID }}" >> $GITHUB_ENV
            echo "DEV_STAGE_ID=${{ vars.FINANCE_DEV_STAGE_ID }}" >> $GITHUB_ENV
            echo "TEST_STAGE_ID=${{ vars.FINANCE_TEST_STAGE_ID }}" >> $GITHUB_ENV
            echo "PROD_STAGE_ID=${{ vars.FINANCE_PROD_STAGE_ID }}" >> $GITHUB_ENV
            echo "WORKSPACE_ID=${{ vars.FINANCE_WORKSPACE_ID }}" >> $GITHUB_ENV

          elif [ "$TARGET" == "sales" ]; then
            echo "PIPELINE_ID=${{ vars.SALES_PIPELINE_ID }}" >> $GITHUB_ENV
            echo "DEV_STAGE_ID=${{ vars.SALES_DEV_STAGE_ID }}" >> $GITHUB_ENV
            echo "TEST_STAGE_ID=${{ vars.SALES_TEST_STAGE_ID }}" >> $GITHUB_ENV
            echo "PROD_STAGE_ID=${{ vars.SALES_PROD_STAGE_ID }}" >> $GITHUB_ENV
            echo "WORKSPACE_ID=${{ vars.SALES_WORKSPACE_ID }}" >> $GITHUB_ENV

          elif [ "$TARGET" == "operations" ]; then
            echo "PIPELINE_ID=${{ vars.OPERATIONS_PIPELINE_ID }}" >> $GITHUB_ENV
            echo "DEV_STAGE_ID=${{ vars.OPERATIONS_DEV_STAGE_ID }}" >> $GITHUB_ENV
            echo "TEST_STAGE_ID=${{ vars.OPERATIONS_TEST_STAGE_ID }}" >> $GITHUB_ENV
            echo "PROD_STAGE_ID=${{ vars.OPERATIONS_PROD_STAGE_ID }}" >> $GITHUB_ENV
            echo "WORKSPACE_ID=${{ vars.OPERATIONS_WORKSPACE_ID }}" >> $GITHUB_ENV
          fi

      - name: Get Fabric token
        run: |
          TOKEN=$(curl -s -X POST https://login.microsoftonline.com/$TENANT_ID/oauth2/v2.0/token \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "client_id=$APP_CLIENT_ID" \
          -d "client_secret=$APP_SECRET_KEY" \
          -d "grant_type=client_credentials" \
          -d "scope=https://api.fabric.microsoft.com/.default" \
          | jq -r .access_token)

          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'ci/requirements/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ci/requirements/requirements.txt

      - name: Sync workspace
        run: |
          python ci/scripts/sync_workspace.py

      - name: Check status before deploy
        run: |
          response=$(curl -s -X GET https://api.fabric.microsoft.com/v1/workspaces/$WORKSPACE_ID/git/status \
            -H "Authorization: Bearer $TOKEN")

          echo "Raw response:"
          echo "$response"

          changes_count=$(echo "$response" | jq '.changes | length')

          if [ "$changes_count" -eq 0 ]; then
            echo "No changes detected"
          else
            echo "Changes detected:"

            echo "$response" | jq -r '
              .changes[] |
              [
                .itemMetadata.itemIdentifier.objectId,
                .itemType,
                .displayName,
                .conflictType
              ] | @tsv
            ' | while IFS=$'\t' read -r objectId itemType displayName conflictType; do
              echo "--------------------------------------"
              echo "Object ID: $objectId"
              echo "Type: $itemType"
              echo "Name: $displayName"
              echo "Conflict: $conflictType"
            done
          fi

          echo "HAS_CHANGES=$changes_count" >> $GITHUB_ENV

      - name: Deploy DEV → TEST
        run: |
          echo "Starting deployment..."

          response=$(curl -s -X POST https://api.fabric.microsoft.com/v1/deploymentPipelines/$PIPELINE_ID/deploy \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
                  \"sourceStageId\": \"$DEV_STAGE_ID\",
                  \"targetStageId\": \"$TEST_STAGE_ID\"
                }")

          echo "Response:"
          echo "$response"

          OPERATION_ID=$(echo "$response" | jq -r '.id // empty')

          if [ -z "$OPERATION_ID" ]; then
            echo "No operationId returned → possible no changes or immediate deployment"
            echo "OPERATION_ID=" >> $GITHUB_ENV
          else
            echo "Operation ID: $OPERATION_ID"
            echo "OPERATION_ID=$OPERATION_ID" >> $GITHUB_ENV
          fi

      - name: Wait for deployment result
        run: |
          if [ -z "$OPERATION_ID" ]; then
            echo "No operation to track. Skipping monitoring."
            exit 0
          fi

          for i in {1..10}
          do
            response=$(curl -s -X GET https://api.fabric.microsoft.com/v1/operations/$OPERATION_ID \
              -H "Authorization: Bearer $TOKEN")

            echo "$response"

            status=$(echo "$response" | jq -r '.status // empty')

            if [ -z "$status" ]; then
              echo "No valid status returned, assuming eventual success"
              exit 0
            fi

            if [ "$status" == "Succeeded" ]; then
              echo "Deployment succeeded"
              exit 0
            fi

            if [ "$status" == "Failed" ]; then
              echo "Deployment failed"
              exit 1
            fi

            sleep 10
          done

          echo "Timeout"
          exit 1

      - name: Deployment Summary
        run: |
          echo "### Dev → Test Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- Pipeline: $PIPELINE_ID" >> $GITHUB_STEP_SUMMARY
          echo "- Operation: $OPERATION_ID" >> $GITHUB_STEP_SUMMARY

      - name: Log deployment (SOX)
        run: |
          python ci/scripts/log_sync_git.py
          python ci/scripts/log_deployment_pipeline.py

  deploy_to_prod:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed folder
        run: |
          echo "Detecting changed folder..."

          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})

          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -q "^DataOps/"; then
            echo "TARGET=sales" >> $GITHUB_ENV

          elif echo "$CHANGED_FILES" | grep -q "^ws-finance/"; then
            echo "TARGET=finance" >> $GITHUB_ENV

          elif echo "$CHANGED_FILES" | grep -q "^ws-deploy-poc/"; then
            echo "TARGET=operations" >> $GITHUB_ENV

          else
            echo "No matching folder → defaulting to finance"
            echo "TARGET=finance" >> $GITHUB_ENV
          fi

      - name: Set pipeline configuration
        run: |
          if [ "${{ github.event.inputs.target }}" == "finance" ]; then
            echo "PIPELINE_ID=${{ vars.FINANCE_PIPELINE_ID }}" >> $GITHUB_ENV
            echo "DEV_STAGE_ID=${{ vars.FINANCE_DEV_STAGE_ID }}" >> $GITHUB_ENV
            echo "TEST_STAGE_ID=${{ vars.FINANCE_TEST_STAGE_ID }}" >> $GITHUB_ENV
            echo "PROD_STAGE_ID=${{ vars.FINANCE_PROD_STAGE_ID }}" >> $GITHUB_ENV

          elif [ "${{ github.event.inputs.target }}" == "sales" ]; then
            echo "PIPELINE_ID=${{ vars.SALES_PIPELINE_ID }}" >> $GITHUB_ENV
            echo "DEV_STAGE_ID=${{ vars.SALES_DEV_STAGE_ID }}" >> $GITHUB_ENV
            echo "TEST_STAGE_ID=${{ vars.SALES_TEST_STAGE_ID }}" >> $GITHUB_ENV
            echo "PROD_STAGE_ID=${{ vars.SALES_PROD_STAGE_ID }}" >> $GITHUB_ENV

          elif [ "${{ github.event.inputs.target }}" == "operations" ]; then
            echo "PIPELINE_ID=${{ vars.OPERATIONS_PIPELINE_ID }}" >> $GITHUB_ENV
            echo "DEV_STAGE_ID=${{ vars.OPERATIONS_DEV_STAGE_ID }}" >> $GITHUB_ENV
            echo "TEST_STAGE_ID=${{ vars.OPERATIONS_TEST_STAGE_ID }}" >> $GITHUB_ENV
            echo "PROD_STAGE_ID=${{ vars.OPERATIONS_PROD_STAGE_ID }}" >> $GITHUB_ENV
          fi

      - name: Get Fabric token
        run: |
          TOKEN=$(curl -s -X POST https://login.microsoftonline.com/$TENANT_ID/oauth2/v2.0/token \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "client_id=$APP_CLIENT_ID" \
          -d "client_secret=$APP_SECRET_KEY" \
          -d "grant_type=client_credentials" \
          -d "scope=https://api.fabric.microsoft.com/.default" \
          | jq -r .access_token)

          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'ci/requirements/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ci/requirements/requirements.txt

      - name: Check status before deploy
        run: |
          response=$(curl -s -X GET https://api.fabric.microsoft.com/v1/workspaces/$WORKSPACE_ID/git/status \
            -H "Authorization: Bearer $TOKEN")

          echo "Raw response:"
          echo "$response"

          changes_count=$(echo "$response" | jq '.changes | length')

          if [ "$changes_count" -eq 0 ]; then
            echo "No changes detected"
          else
            echo "Changes detected:"

            echo "$response" | jq -r '
              .changes[] |
              [
                .itemMetadata.itemIdentifier.objectId,
                .itemType,
                .displayName,
                .conflictType
              ] | @tsv
            ' | while IFS=$'\t' read -r objectId itemType displayName conflictType; do
              echo "--------------------------------------"
              echo "Object ID: $objectId"
              echo "Type: $itemType"
              echo "Name: $displayName"
              echo "Conflict: $conflictType"
            done
          fi

          echo "HAS_CHANGES=$changes_count" >> $GITHUB_ENV

      - name: Deploy TEST → PROD
        run: |
          response=$(curl -s -X POST https://api.fabric.microsoft.com/v1/deploymentPipelines/$PIPELINE_ID/deploy \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          -d "{
                \"sourceStageId\": \"$TEST_STAGE_ID\",
                \"targetStageId\": \"$PROD_STAGE_ID\"
              }")

          echo "$response"

          OPERATION_ID=$(echo "$response" | jq -r '.id // empty')
          echo "OPERATION_ID=$OPERATION_ID" >> $GITHUB_ENV

      - name: Wait for deployment result
        run: |
          if [ -z "$OPERATION_ID" ]; then
            echo "No operationId → skipping tracking"
            exit 0
          fi

          for i in {1..10}
          do
            response=$(curl -s -X GET https://api.fabric.microsoft.com/v1/operations/$OPERATION_ID \
              -H "Authorization: Bearer $TOKEN")

            echo "$response"

            status=$(echo "$response" | jq -r '.status // empty')

            if [ "$status" == "Succeeded" ]; then
              echo "Deployment succeeded"
              exit 0
            fi

            if [ "$status" == "Failed" ]; then
              echo "Deployment failed"
              exit 1
            fi

            if [ -z "$status" ]; then
              echo "No valid status returned, assuming eventual success"
              exit 0
            fi

            sleep 10
          done

          echo "Timeout but not failing"
          exit 0

      - name: Deployment Summary
        run: |
          echo "### Test → Prod Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- Pipeline: $PIPELINE_ID" >> $GITHUB_STEP_SUMMARY
          echo "- Operation: $OPERATION_ID" >> $GITHUB_STEP_SUMMARY

      - name: Log deployment (SOX - PROD)
        run: |
          python ci/scripts/log_deployment_pipeline.py
